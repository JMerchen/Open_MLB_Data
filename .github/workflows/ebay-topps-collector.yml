name: eBay Topps Pricer Collector

on:
  schedule:
    # Every 6 hours. Frequent enough that delistings (our sold-proxy signal)
    # get caught reasonably close to when they happen, without hammering
    # eBay's API.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    # Required once, one-time, in the repo's Settings -> Pages -> Build and
    # deployment -> Source: "GitHub Actions" -- see Ebay_Topps_Pricer/README.md.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: Ebay_Topps_Pricer
        run: pip install -r requirements.txt

      - name: Run collector
        working-directory: Ebay_Topps_Pricer
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python scripts/run_collector.py

      - name: Export static site data
        working-directory: Ebay_Topps_Pricer
        run: python scripts/export_static.py

      - name: Commit updated comps database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Ebay_Topps_Pricer/data/pricer.sqlite3
          git diff --cached --quiet || git commit -m "Update eBay Topps comps database [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Ebay_Topps_Pricer/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
